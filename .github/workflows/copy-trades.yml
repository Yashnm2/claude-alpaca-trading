name: Pelosi Copy-Trade Bot

on:
  schedule:
    # Every 30 min, 9 AM–5 PM ET (13:00–21:00 UTC), Mon–Fri
    - cron: "0,30 13-21 * * 1-5"
  workflow_dispatch:   # allow manual trigger from the Actions tab

jobs:
  copy-trades:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit state.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: capitol_trades_bot/requirements.txt

      - name: Install dependencies
        run: pip install -r capitol_trades_bot/requirements.txt

      - name: Run copy-trade bot
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:   ${{ secrets.ALPACA_BASE_URL }}
          TRADE_USD_AMOUNT:  ${{ secrets.TRADE_USD_AMOUNT }}
        run: python capitol_trades_bot/bot.py

      - name: Commit updated state (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add capitol_trades_bot/state.json
          git diff --cached --quiet || git commit -m "chore: update trade state [skip ci]"
          git push
